site_name: ETHOS.TSAM Documentation
site_url: https://fzj-iek3-vsa.github.io/tsam/
repo_url: https://github.com/FZJ-IEK3-VSA/tsam
repo_name: FZJ-IEK3-VSA/tsam
edit_uri: edit/develop/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/tsam-logo-favicon.svg
  favicon: assets/tsam-logo-favicon.svg
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home:
    - index.md
    - Installation: installation.md
    - Quickstart: notebooks/quickstart.ipynb
  - User Guide:
    - Overview: user-guide/index.md
    - Segmentation: notebooks/segmentation.ipynb
    - How small can you go?: notebooks/tuning.ipynb
    - Clustering methods: notebooks/clustering_methods.ipynb
    - Representations: notebooks/representations.ipynb
    - Extreme periods: notebooks/extreme_periods.ipynb
    - Optimization workflow: notebooks/optimization_workflow.ipynb
    - Background:
      - background/index.md
      - Mathematical Background: background/math.md
      - Architecture:
        - background/architecture/index.md
        - System Context: background/architecture/context.md
        - Pipeline Guide: background/architecture/pipeline_guide.md
      - Decisions:
        - background/decisions/index.md
        - 0001 — V4 Pipeline: background/decisions/0001-v4-pipeline.md
  - Reference:
    - API:
      - api/index.md
      - Configuration: api/configuration.md
      - Results: api/results.md
      - Pipeline internals: api/pipeline.md
      - Tuning: api/tuning.md
      - Utilities: api/utilities.md
    - Glossary: glossary.md
    - Further Reading: further-reading.md
    - Migration Guide: migration-guide.md
    - Contributing: contributing.md
    - Changelog: changelog.md
    - Legal Notice: legal-notice.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: auto
            docstring_section_style: table
            summary: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
  - mkdocs-jupyter:
      # Notebooks are pre-executed in parallel by scripts/execute_notebooks.py
      # before `mkdocs build`/`mkdocs serve`; see CONTRIBUTING.md. mkdocs
      # only renders the already-populated outputs, which keeps the build
      # fast.
      execute: false
      kernel_name: python3
      include_source: true
      allow_errors: false
      include_requirejs: true
      toc_depth: 3

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
  - pymdownx.mark
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - abbr
  - toc:
      permalink: true
      toc_depth: 3

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.plot.ly/plotly-3.3.0.min.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/panzoom@9.4.3/dist/panzoom.min.js
  - javascripts/diagram-zoom-init.js
  - javascripts/notebook-prompts.js
  - javascripts/notebook-download.js
