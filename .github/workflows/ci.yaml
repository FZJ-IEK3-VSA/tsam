name: CI

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NOTEBOOKS: >-
    docs/source/examples_notebooks/quickstart.ipynb
    docs/source/examples_notebooks/clustering_methods.ipynb
    docs/source/examples_notebooks/optimization_input.ipynb
    docs/source/examples_notebooks/representations.ipynb
    docs/source/examples_notebooks/segmentation.ipynb
    docs/source/examples_notebooks/k_maxoids.ipynb
    docs/source/examples_notebooks/clustering_transfer.ipynb

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
      - run: ruff check --output-format=github --config=pyproject.toml
      - run: ruff format --diff --config=pyproject.toml

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted for standard multi-version + cross-platform testing
        os: [ubuntu-24.04]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: uv pip install --system ".[develop]"

      - name: Run tests
        run: pytest -n auto -vv

      - name: Run notebooks
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-24.04'
        run: >-
          pytest -n auto -vv
          --dist loadscope
          --nbval-lax
          --nbval-current-env
          --nbval-cell-timeout=900000
          ${{ env.NOTEBOOKS }}

  # Self-hosted for expensive min/max dependency boundary testing on PRs
  test-dependency-bounds:
    name: Test min/max deps
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - deps: "scikit-learn==1.3.0 pandas==2.2.0 numpy==1.22.4"
            label: "min versions"
          - deps: "scikit-learn==1.8.0 pandas==3.0.1 numpy==2.4.2"
            label: "max versions"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with ${{ matrix.label }}
        run: |
          uv pip install --system ".[develop]"
          uv pip install --system ${{ matrix.deps }}

      - name: Run tests
        run: pytest -n auto -vv

  docs:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: uv pip install --system ".[develop]"

      - name: Build Sphinx docs
        # TODO: add -W flag once existing warnings are fixed
        run: sphinx-build -b html docs/source docs/build/html

  ci-success:
    name: CI Success
    if: always()
    needs: [lint, test, docs]
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
