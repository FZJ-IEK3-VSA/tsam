name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NOTEBOOKS: >-
    docs/source/examples_notebooks/quickstart.ipynb
    docs/source/examples_notebooks/clustering_methods.ipynb
    docs/source/examples_notebooks/optimization_input.ipynb
    docs/source/examples_notebooks/representations.ipynb
    docs/source/examples_notebooks/segmentation.ipynb
    docs/source/examples_notebooks/k_maxoids.ipynb
    docs/source/examples_notebooks/clustering_transfer.ipynb

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
      - run: ruff check --output-format=github --config=pyproject.toml
      - run: ruff format --diff --config=pyproject.toml

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: uv pip install --system ".[develop]"

      - name: Run tests
        run: pytest -n auto -vv

      - name: Run notebooks
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-24.04'
        run: >-
          pytest -n auto -vv
          --dist loadscope
          --nbval-lax
          --nbval-current-env
          --nbval-cell-timeout=900000
          ${{ env.NOTEBOOKS }}

  # Min/max dependency boundary testing on PRs to master
  extract-versions:
    if: github.base_ref == 'master'
    uses: FZJ-IEK3-VSA/.github/.github/workflows/_extract_env_versions_matrix.yml@main
    with:
      libraries: "scikit-learn,pandas,numpy,pyomo,networkx,tqdm,highspy"
      version_type: both
      env_file: environment.yml

  test-dependency-bounds:
    name: Test ${{ matrix.dependencies.library_name }} ${{ matrix.dependencies.version }} (${{ matrix.dependencies.version_type }})
    if: github.base_ref == 'master'
    needs: extract-versions
    strategy:
      fail-fast: false
      matrix:
        runner_tag: ["self-hosted"]
        dependencies: ${{ fromJSON(needs.extract-versions.outputs.matrix) }}
    uses: FZJ-IEK3-VSA/.github/.github/workflows/_run_single_conda_forge_test.yml@main
    with:
      runner_tag: ${{ matrix.runner_tag }}
      requirements_file_name: environment.yml
      examples_to_execute: "docs/source/examples_notebooks/quickstart.ipynb docs/source/examples_notebooks/clustering_methods.ipynb docs/source/examples_notebooks/optimization_input.ipynb docs/source/examples_notebooks/representations.ipynb docs/source/examples_notebooks/segmentation.ipynb docs/source/examples_notebooks/k_maxoids.ipynb docs/source/examples_notebooks/clustering_transfer.ipynb"
      library_version: ${{ matrix.dependencies.version }}
      dependency_position_env_file: ${{ matrix.dependencies.yaml_position }}
      library_name: ${{ matrix.dependencies.library_name }}
      multiprocessing_pytest_string: "-n auto"
      multiprocessing_example_string: "-n auto"

  # Renovate: test max versions of changed dependencies
  detect-renovate-changes:
    name: Detect changed dependencies
    if: startsWith(github.head_ref, 'renovate/')
    uses: FZJ-IEK3-VSA/.github/.github/workflows/_detect_renovate_changed_libraries.yml@main
    with:
      files: "environment.yml pyproject.toml"

  extract-renovate-versions:
    name: Extract max versions of changed libraries
    needs: detect-renovate-changes
    if: startsWith(github.head_ref, 'renovate/') && needs.detect-renovate-changes.outputs.libraries != ''
    uses: FZJ-IEK3-VSA/.github/.github/workflows/_extract_env_versions_matrix.yml@main
    with:
      libraries: ${{ needs.detect-renovate-changes.outputs.libraries }}
      version_type: max
      env_file: environment.yml

  test-renovate:
    name: Test ${{ matrix.dependencies.library_name }} ${{ matrix.dependencies.version }} (max)
    needs: extract-renovate-versions
    if: startsWith(github.head_ref, 'renovate/')
    strategy:
      fail-fast: false
      matrix:
        runner_tag: ["self-hosted"]
        dependencies: ${{ fromJSON(needs.extract-renovate-versions.outputs.matrix) }}
    uses: FZJ-IEK3-VSA/.github/.github/workflows/_run_single_conda_forge_test.yml@main
    with:
      runner_tag: ${{ matrix.runner_tag }}
      requirements_file_name: environment.yml
      examples_to_execute: "docs/source/examples_notebooks/quickstart.ipynb docs/source/examples_notebooks/clustering_methods.ipynb docs/source/examples_notebooks/optimization_input.ipynb docs/source/examples_notebooks/representations.ipynb docs/source/examples_notebooks/segmentation.ipynb docs/source/examples_notebooks/k_maxoids.ipynb docs/source/examples_notebooks/clustering_transfer.ipynb"
      library_name: ${{ matrix.dependencies.library_name }}
      library_version: ${{ matrix.dependencies.version }}
      dependency_position_env_file: ${{ matrix.dependencies.yaml_position }}
      multiprocessing_pytest_string: "-n auto"
      multiprocessing_example_string: "-n auto"

  docs:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pandoc

      - name: Install
        run: uv pip install --system ".[develop]"

      - name: Build Sphinx docs
        # TODO: add -W flag once existing warnings are fixed
        run: sphinx-build -b html docs/source docs/build/html

  ci-success:
    name: CI Success
    if: always()
    needs: [lint, test, docs]
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
