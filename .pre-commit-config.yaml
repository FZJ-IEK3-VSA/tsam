# pre-commit runs in CI via pre-commit/action in .github/workflows/ci-develop.yaml
# and ci-master.yaml (the "Pre-commit" check), with an auto-fix PR workflow in
# pre-commit-autofix.yaml. Hook revisions are managed by Renovate via the
# pre-commit manager (see .github/renovate.json).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # docs/changelog.md is a symlink to ../CHANGELOG.md. On Windows checkouts
      # without symlink support it appears as a text file containing the target
      # path; whitespace hooks would then "fix" it by appending a newline,
      # corrupting the symlink target on Linux. Exclude it from both hooks.
      - id: trailing-whitespace
        exclude: ^docs/changelog\.md$
      - id: end-of-file-fixer
        exclude: ^docs/changelog\.md$
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=4000']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pandas-stubs
        args: [--ignore-missing-imports]
        exclude: ^(docs/|test/|benchmarks/)

  - repo: local
    hooks:
      # Fail if a src/tsam module is added without a docs/api reference (or an
      # explicit allowlist entry). The script scans the whole tree itself.
      - id: check-api-reference
        name: check API reference coverage
        entry: python docs/scripts/check_api_reference.py
        language: system
        pass_filenames: false
        files: ^(src/tsam/.*\.py|docs/.*\.md)$
