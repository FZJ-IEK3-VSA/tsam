# pre-commit.ci is enabled on this repo; Renovate also manages hook revs via the
# pre-commit manager (see .github/renovate.json). `autoupdate_schedule: quarterly`
# is the longest interval pre-commit.ci accepts and makes it effectively a safety
# net behind Renovate's weekly run. To disable pre-commit.ci autoupdates entirely,
# toggle it off in the pre-commit.ci dashboard (no config-only option exists).
ci:
  autoupdate_schedule: quarterly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=4000']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pandas-stubs
        args: [--ignore-missing-imports]
        exclude: ^(docs/|test/|benchmarks/)
