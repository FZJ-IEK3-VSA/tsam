# Renovate manages hook revs via the pre-commit manager (see .github/renovate.json).
# This `ci:` block is read by pre-commit.ci if the app is ever enabled on the repo;
# `autoupdate_schedule: never` prevents pre-commit.ci from racing with Renovate.
ci:
  autoupdate_schedule: never

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=4000']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pandas-stubs
        args: [--ignore-missing-imports]
        exclude: ^(docs/|test/|benchmarks/)
