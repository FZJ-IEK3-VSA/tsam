name: tsam_env
channels:
  - conda-forge
dependencies:
  - python>=3.10,<=3.14.3
  - pip
  # Core dependencies
  - scikit-learn >=1.3.0,<=1.8.0
  - pandas >=2.2.0,<=3.0.2
  - numpy >=1.22.4,<=2.4.3
  - pyomo >=6.4.3,<=6.10.0
  - networkx >=2.5,<=3.6.1
  - tqdm >=4.21.0,<=4.67.3
  - highspy >=1.7.2,<=1.13.1
  - plotly >=5.0.0,<=6.6.0
  # Testing
  - pytest <=9.0.2
  - pytest-cov <=7.1.0
  - pytest-xdist <=3.8.0
  - codecov <=2.1.13
  - nbval <=0.11.0
  # Documentation
  - mkdocs >=1.6,<=1.6.1
  - mkdocs-material >=9.5,<=9.7.6
  - mkdocstrings-python >=0.27,<=2.0.2
  - mkdocs-jupyter >=0.25,<=0.25.1
  - mkdocs-gen-files >=0.5,<=0.6.1
  - mkdocs-literate-nav >=0.6,<=0.6.3
  # Linting and formatting
  - ruff <=0.15.9
  - mypy <=1.20.0
  - pre-commit <=4.5.1
